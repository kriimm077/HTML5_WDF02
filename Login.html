<main id="main">
    <h2>Login</h2>
    <form>
        <div>
            <label for="user">Username:</label>
            <input type="text" id="user" required>
        </div>
        <div>
            <label for="pass">Password:</label>
            <input type="password" id="pass" required>
        </div>
        <button type="submit">Sign In</button>
    </form>
</main>
